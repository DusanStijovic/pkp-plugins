name: Deploy Plugin

on:
  workflow_dispatch:
    inputs:
      plugin_name:
        description: Plugin directory name under plugins/generic
        required: true
        default: simplePopupButton
      environment_name:
        description: GitHub environment name
        required: true
        default: production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync plugin to production
        env:
          PLUGIN_NAME: ${{ inputs.plugin_name }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_PLUGIN_BASE_PATH: ${{ secrets.PROD_PLUGIN_BASE_PATH }}
        run: |
          set -euo pipefail
          test -d "plugins/generic/${PLUGIN_NAME}"
          rsync -az --delete \
            "plugins/generic/${PLUGIN_NAME}/" \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}:${PROD_PLUGIN_BASE_PATH}/${PLUGIN_NAME}/"
