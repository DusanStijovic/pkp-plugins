name: Plugin Release

on:
  push:
    tags:
      - '*-v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Package tagged plugin
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x scripts/package-plugin.sh
          PLUGIN_NAME="${TAG_NAME%-v*}"
          PLUGIN_DIR="plugins/generic/${PLUGIN_NAME}"
          test -d "$PLUGIN_DIR"
          ./scripts/package-plugin.sh "$PLUGIN_DIR"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
