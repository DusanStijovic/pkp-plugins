name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils zip

      - name: Validate plugin PHP files
        run: |
          set -euo pipefail
          find plugins -name '*.php' -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done

      - name: Validate plugin version.xml files
        run: |
          set -euo pipefail
          find plugins -name 'version.xml' -print0 | while IFS= read -r -d '' file; do
            xmllint --noout "$file"
          done

      - name: Check required plugin files
        run: |
          set -euo pipefail
          for plugin_dir in plugins/generic/*; do
            [ -d "$plugin_dir" ] || continue
            test -f "$plugin_dir/index.php"
            test -f "$plugin_dir/version.xml"
          done

      - name: Package plugin artifacts
        run: |
          set -euo pipefail
          chmod +x scripts/package-plugin.sh
          for plugin_dir in plugins/generic/*; do
            [ -d "$plugin_dir" ] || continue
            ./scripts/package-plugin.sh "$plugin_dir"
          done

      - name: Upload plugin packages
        uses: actions/upload-artifact@v4
        with:
          name: plugin-packages
          path: dist/*.zip
          if-no-files-found: error

  php-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Download PHPUnit
        run: |
          curl -Ls https://phar.phpunit.de/phpunit-11.phar -o phpunit.phar
          chmod +x phpunit.phar

      - name: Run PHPUnit tests
        run: php ./phpunit.phar --configuration phpunit.xml

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare smoke script
        run: chmod +x scripts/smoke-ojs.sh

      - name: Boot local OJS stack and verify plugin mount
        run: ./scripts/smoke-ojs.sh

      - name: Upload Docker logs
        if: always()
        run: docker compose logs --no-color > docker-smoke.log || true

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-logs
          path: docker-smoke.log
          if-no-files-found: ignore
